name: Contributor truth gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  truth-gate:
    name: Python 3.13 / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install MineBot
        run: python -m pip install -e .

      - name: Run contributor truth gate
        run: python -m unittest discover -s tests -p 'test_contributor_truth_gate.py' -v
